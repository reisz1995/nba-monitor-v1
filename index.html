
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBA Monitor - Live Scores & Stats</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-pure: #000000;
      --bg-surface: #0a0a0a;
      --bg-glass: rgba(255, 255, 255, 0.03);
      --indigo-500: #6366f1;
      --orange-500: #f97316;
      --emerald-500: #10b981;
      --rose-500: #f43f5e;
      --amber-500: #f59e0b;
      --text-primary: #f8fafc;
      --text-secondary: #64748b;
      --glass-blur: blur(12px);
      --glass-border: 1px solid rgba(255, 255, 255, 0.1);
      --sharp-shadow: 8px 8px 0px #000000;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-pure);
      color: var(--text-primary);
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }
    
    .font-mono { font-family: 'Space Mono', monospace; }
    
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: var(--bg-pure);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: var(--indigo-500);
    }
    
    .table-container {
      width: 100%;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .card-brutalist {
      background: var(--bg-surface);
      border: 2px solid white;
      box-shadow: var(--sharp-shadow);
      transition: all 200ms ease;
    }
    .card-brutalist:hover {
      transform: translate(-2px, -2px);
      box-shadow: 12px 12px 0px #000000;
    }

    .table-glass {
      background: var(--bg-glass);
      backdrop-filter: var(--glass-blur);
      border: var(--glass-border);
      border-radius: 12px;
      overflow: hidden;
    }

    .cursor-pointer { cursor: pointer; }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",

    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.48.1",
    "swr": "https://esm.sh/swr@^2.2.5",
    "html-to-image": "https://esm.sh/html-to-image@^1.11.11"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

<script type="module" src="/index.tsx"></script>
</body>
</html>
